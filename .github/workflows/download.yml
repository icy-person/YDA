name: Smart YouTube Downloader (TVHTML5 + WARP + AUTO QUALITY)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

      max_quality:
        description: "Maximum quality allowed"
        required: true
        default: "1080"
        type: choice
        options:
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - 360
          - audio

jobs:
  download:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ==========================================
      # Install Dependencies
      # ==========================================
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl wget wireguard-tools
          python -m pip install -U yt-dlp

      # ==========================================
      # Install WARP via WGCF
      # ==========================================
      - name: Install WGCF
        run: |
          wget -q https://github.com/ViRb3/wgcf/releases/latest/download/wgcf_2.2.30_linux_amd64 -O wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/

          wgcf register --accept-tos
          wgcf generate

      # ==========================================
      # Install WireProxy
      # ==========================================
      - name: Install WireProxy
        run: |
          wget -q https://github.com/pufferffish/wireproxy/releases/latest/download/wireproxy-linux-amd64 -O wireproxy.tar.gz
          
          tar -xzf wireproxy.tar.gz
          
          chmod +x wireproxy
          sudo mv wireproxy /usr/local/bin/

      # ==========================================
      # Start WARP Proxy
      # ==========================================
      - name: Start WARP
        run: |
          mkdir -p warp

          cat > warp/config.ini << EOF
          [Interface]
          PrivateKey = $(grep PrivateKey wgcf-profile.conf | awk '{print $3}')
          Address = 172.16.0.2/32
          DNS = 1.1.1.1
          MTU = 1280

          [Peer]
          PublicKey = $(grep PublicKey wgcf-profile.conf | awk '{print $3}')
          Endpoint = $(grep Endpoint wgcf-profile.conf | awk '{print $3}')
          AllowedIPs = 0.0.0.0/0

          [Socks5]
          BindAddress = 127.0.0.1:1080
          EOF

          nohup wireproxy -c warp/config.ini &

          sleep 6

          echo "Testing WARP IP:"
          curl --socks5 127.0.0.1:1080 https://ipinfo.io

      # ==========================================
      # Smart Format Detection
      # ==========================================
      - name: Smart Format Detection
        id: detect
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          MAX="${{ github.event.inputs.max_quality }}"

          echo "Trying tvhtml5..."
          yt-dlp \
            --proxy socks5://127.0.0.1:1080 \
            --js-runtimes "node:$(which node)" \
            --extractor-args "youtube:player_client=tvhtml5" \
            -F "$URL" > formats.txt 2>&1 || true

          if grep -q "Skipping unsupported client" formats.txt; then
            echo "Fallback to android"
            yt-dlp --proxy socks5://127.0.0.1:1080 -F "$URL" > formats.txt
          fi

          if [ "$MAX" = "audio" ]; then
            FORMAT="ba"
          else
            FORMAT=$(grep mp4 formats.txt \
              | awk '{print $1,$3}' \
              | awk -v max="$MAX" '
                {
                  split($2,res,"x");
                  if(res[2] <= max) print $1,res[2];
                }' \
              | sort -k2 -nr \
              | head -n1 \
              | awk '{print $1}'
            )

            FORMAT="${FORMAT}+ba"
          fi

          echo "Selected format: $FORMAT"
          echo "format=$FORMAT" >> $GITHUB_OUTPUT

      # ==========================================
      # Download Video
      # ==========================================
      - name: Download Video
        run: |
          mkdir -p downloads

          FORMAT="${{ steps.detect.outputs.format }}"
          URL="${{ github.event.inputs.youtube_url }}"

          yt-dlp \
            --proxy socks5://127.0.0.1:1080 \
            --js-runtimes "node:$(which node)" \
            --extractor-args "youtube:player_client=tvhtml5" \
            --merge-output-format mp4 \
            --sleep-requests 2 \
            --retries 10 \
            -f "$FORMAT" \
            "$URL" \
            -o "downloads/%(title)s.%(ext)s" || FALLBACK=true

          if [ "$FALLBACK" = "true" ]; then
            yt-dlp \
              --proxy socks5://127.0.0.1:1080 \
              --extractor-args "youtube:player_client=android" \
              --merge-output-format mp4 \
              --sleep-requests 2 \
              --retries 10 \
              -f "$FORMAT" \
              "$URL" \
              -o "downloads/%(title)s.%(ext)s"
          fi

          ls -lh downloads

      # ==========================================
      # Detect File Size
      # ==========================================
      - name: Detect File Size
        id: size
        run: |
          FILE=$(ls downloads | head -n1)
          SIZE=$(stat -c%s "downloads/$FILE")

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # ==========================================
      # Small File → Repo
      # ==========================================
      - name: Upload to Repo
        if: steps.size.outputs.size < 50000000
        run: |
          mkdir -p videos
          mv downloads/* videos/

          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase
          git add videos
          git commit -m "Add downloaded video"
          git push || true

      # ==========================================
      # Medium File → Release
      # ==========================================
      - name: Upload Medium
        if: steps.size.outputs.size >= 50000000 && steps.size.outputs.size < 2000000000
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # Large File → Artifact
      # ==========================================
      - name: Upload Large
        if: steps.size.outputs.size >= 2000000000
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
