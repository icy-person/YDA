name: Download and Upload Large File

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "URL of the file to download"
        required: true
        type: string

  schedule:
    - cron: "0 0 * * *"

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Download file
        run: |
          echo "Downloading from: ${{ github.event.inputs.file_url }}"
          filename=$(basename "${{ github.event.inputs.file_url }}")
          curl -L "${{ github.event.inputs.file_url }}" -o "$filename"
          echo "Downloaded file: $filename"
        shell: bash

      - name: Track LFS files
        run: |
          filename=$(basename "${{ github.event.inputs.file_url }}")
          git lfs track "$filename"
          git add .gitattributes

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

            - name: Commit and push
        run: |
          filename=$(basename "${{ github.event.inputs.file_url }}")
          git add "$filename"
          git commit -m "auto update file: $filename" || echo "No changes to commit"

          # Fix: pull before pushing
          git pull --rebase --autostash

          git push
